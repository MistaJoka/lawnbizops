name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Project-page base path. When the custom domain is attached, set
          # this to '/' (and add a CNAME file) — see README "Deployment".
          VITE_BASE: /lawnbizops/
          # Publishable values — public by design (they ship in the JS bundle).
          VITE_SUPABASE_URL: https://kjovmqtcalrfdguccnfm.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_OvnOGkNCeBEHUss8G7VjCA_TvZVCFlw
          # Guest mode: skip the login screen by signing in anonymously. RLS
          # still isolates each guest in its own org. ⚠️ TEMPORARY — remove this
          # (and re-enable real auth) before onboarding real customers. Requires
          # "Anonymous sign-ins" enabled in the Supabase dashboard. See
          # src/lib/autologin.ts.
          VITE_GUEST_MODE: '1'
          # DEV/TEST-ONLY auto-login alternative (unused while guest mode is on).
          # Empty unless these repo secrets are set. See src/lib/autologin.ts.
          VITE_AUTOLOGIN_EMAIL: ${{ secrets.AUTOLOGIN_EMAIL }}
          VITE_AUTOLOGIN_PASSWORD: ${{ secrets.AUTOLOGIN_PASSWORD }}
      # SPA fallback: GitHub Pages serves 404.html for unknown paths
      - run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v5
        with:
          path: dist
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
