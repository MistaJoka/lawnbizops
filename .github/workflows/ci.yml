name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run format:check
      # test:coverage enforces the src/lib coverage thresholds (see vite.config).
      - run: npm run test:coverage
      - run: npm run build
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_placeholder
      - run: npm run bundle:check

  # Spins up a real Supabase stack, applies every migration, and runs the
  # two-org RLS isolation test. This is the load-bearing tenant-safety
  # guardrail — a leak here fails the build before it can reach prod.
  rls-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: supabase/setup-cli@v1
        with:
          # Pin a specific version — 'latest' resolves via the GitHub API and
          # gets rate-limited on shared runners.
          version: 2.107.0
      - name: Start Supabase + apply all migrations
        run: |
          supabase start
          supabase db reset
      - name: Two-org RLS isolation test
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 -f supabase/tests/rls_isolation.sql
      - name: Data-layer invariants (conservation laws on the seed)
        run: |
          psql "postgresql://postgres:postgres@127.0.0.1:54322/postgres" \
            -v ON_ERROR_STOP=1 -f supabase/tests/invariants.sql

  # Drives the real app (vite dev server) against a seeded local Supabase stack
  # through the critical multi-step flows — the money loop (incl. void→restore
  # reversibility), quick-add, auth, and the Board/Route toggle.
  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - uses: supabase/setup-cli@v1
        with:
          version: 2.107.0
      - name: Start Supabase (applies migrations + seed)
        run: supabase start
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - name: Sub-path routing smoke (guards the basepath/Pages outage class)
        # Prod is served under /lawnbizops/; dev/e2e run at base '/', so only a
        # prod-base build catches a missing router basepath. Placeholder Supabase
        # env so the client module loads (no backend needed — with no session the
        # app routes to /login, which is all this asserts).
        env:
          VITE_SUPABASE_URL: https://example.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: sb_publishable_ci_placeholder
        run: |
          VITE_BASE=/lawnbizops/ npm run build
          node scripts/smoke-basepath.mjs
      - name: E2E regression suite
        env:
          # `supabase start` already seeded a fresh DB, so skip the global-setup
          # reset. Point the dev server at the local stack.
          E2E_SKIP_RESET: '1'
          VITE_SUPABASE_URL: http://127.0.0.1:54321
        run: |
          export VITE_SUPABASE_PUBLISHABLE_KEY="$(supabase status -o env | sed -n 's/^PUBLISHABLE_KEY="\(.*\)"$/\1/p')"
          npm run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # Backend-free render smoke: drives the app in DEMO mode (VITE_DEMO=1, the
  # in-memory fake backend) and visits every authed route, asserting each paints
  # its content without crashing into the error boundary or throwing to console.
  # No Supabase/Docker — fast, and the only e2e that can run in a sandbox.
  e2e-demo:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:demo
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-demo-report
          path: playwright-report/
          retention-days: 7

  # Mutation testing on the scoped pure-logic files (route/csv/dates/format/
  # recurrence/board). Catches assertions that pass but don't actually pin
  # behaviour — it already found 2 real gaps once. Gated by the `break`
  # threshold in stryker.config.json.
  mutation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - run: npm run test:mutation
